services:
  qwen3-8b:
    image: vllm/vllm-openai:latest
    container_name: qwen3-8b
    runtime: nvidia
    restart: unless-stopped
    environment:
      HF_HOME: /root/.cache/huggingface
    volumes:
      - hf_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      Qwen/Qwen3-8B
      --quantization bitsandbytes
      --load-format bitsandbytes
      --dtype float16
      --max-model-len 16384
      --gpu-memory-utilization 0.90
      --max-num-seqs 32
      --enforce-eager
      --served-model-name qwen3-8b
      --trust-remote-code
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  hf_cache:
    driver: local
